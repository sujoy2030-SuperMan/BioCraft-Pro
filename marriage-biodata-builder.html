<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marriage Biodata Builder | BioCraft Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">BioCraft Pro</a>
                <div class="nav-links">
                    <button class="btn btn-primary" onclick="exportPDF()">Download Marriage Biodata</button>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </nav>
        </div>
    </header>

    <div class="builder-container">
        <aside class="editor-sidebar">
            <div class="editor-section">
                <h3>Personal Info</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="fullName" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Religion / Caste</label>
                    <input type="text" class="form-control" id="religion" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Height</label>
                    <input type="text" class="form-control" id="height" placeholder="5'8\"" oninput="updatePreview()">
                </div>
            </div>
            <div class="editor-section">
                <h3>Family Details</h3>
                <div class="form-group">
                    <label>Father's Occupation</label>
                    <input type="text" class="form-control" id="fatherOcc" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Siblings</label>
                    <input type="text" class="form-control" id="siblings" oninput="updatePreview()">
                </div>
            </div>
        </aside>

        <main class="preview-area">
            <div class="resume-paper" id="resumePreview" style="background: #fffaf0; border: 10px double #d4af37;">
                <h2 style="text-align: center; color: #8b0000; font-family: 'Georgia', serif;">MARRIAGE BIODATA</h2>
                <div style="margin-top: 2rem;">
                    <h4 style="border-bottom: 2px solid #8b0000; color: #8b0000;">Personal Details</h4>
                    <p><strong>Name:</strong> <span id="prevName"></span></p>
                    <p><strong>Religion/Caste:</strong> <span id="prevReligion"></span></p>
                    <p><strong>Height:</strong> <span id="prevHeight"></span></p>
                    
                    <h4 style="border-bottom: 2px solid #8b0000; color: #8b0000; margin-top: 1.5rem;">Family Details</h4>
                    <p><strong>Father's Occupation:</strong> <span id="prevFatherOcc"></span></p>
                    <p><strong>Siblings:</strong> <span id="prevSiblings"></span></p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pdf-export.js"></script>
</body>
</html>
