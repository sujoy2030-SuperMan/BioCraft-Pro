<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator | BioCraft Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .certificate {
            width: 842px;
            height: 595px;
            background: white;
            border: 20px solid var(--primary);
            padding: 50px;
            position: relative;
            text-align: center;
            color: #333;
        }
        .cert-inner {
            border: 5px solid var(--secondary);
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .cert-title {
            font-size: 3rem;
            font-family: 'Georgia', serif;
            color: var(--primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">BioCraft Pro</a>
                <div class="nav-links">
                    <button class="btn btn-primary" onclick="exportPDF()">Download Certificate</button>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </nav>
        </div>
    </header>

    <div class="builder-container">
        <aside class="editor-sidebar">
            <div class="editor-section">
                <h3>Certificate Details</h3>
                <div class="form-group">
                    <label>Recipient Name</label>
                    <input type="text" class="form-control" id="fullName" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Purpose / Event</label>
                    <input type="text" class="form-control" id="purpose" placeholder="Ex: Outstanding Achievement" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" class="form-control" id="certDate" oninput="updatePreview()">
                </div>
            </div>
        </aside>

        <main class="preview-area">
            <div class="certificate" id="resumePreview">
                <div class="cert-inner">
                    <h1 class="cert-title">CERTIFICATE</h1>
                    <p style="font-size: 1.2rem;">OF APPRECIATION</p>
                    <p style="margin: 20px 0;">THIS CERTIFICATE IS PROUDLY PRESENTED TO</p>
                    <h2 id="prevName" style="font-size: 2.5rem; border-bottom: 2px solid #333; display: inline-block; min-width: 300px;">John Doe</h2>
                    <p style="margin: 20px 0;" id="prevPurpose">For successfully completing the professional development workshop.</p>
                    <div style="display: flex; justify-content: space-around; margin-top: 50px;">
                        <div>
                            <div style="border-bottom: 1px solid #333; width: 150px;"></div>
                            <p>DIRECTOR</p>
                        </div>
                        <div>
                            <p id="prevDate">2026-06-21</p>
                            <div style="border-bottom: 1px solid #333; width: 150px;"></div>
                            <p>DATE</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pdf-export.js"></script>
</body>
</html>
