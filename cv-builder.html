<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder | BioCraft Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">BioCraft Pro</a>
                <div class="nav-links">
                    <button class="btn btn-primary" onclick="exportPDF()">Download CV</button>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </nav>
        </div>
    </header>

    <div class="builder-container">
        <aside class="editor-sidebar">
            <div class="editor-section">
                <h3>Academic Info</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Dr. Jane Smith" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Academic Title</label>
                    <input type="text" class="form-control" id="jobTitle" placeholder="Senior Researcher" oninput="updatePreview()">
                </div>
            </div>

            <div class="editor-section">
                <h3>Publications</h3>
                <div id="publicationList"></div>
                <button class="btn" onclick="addPublication()">+ Add Publication</button>
            </div>

            <div class="editor-section">
                <h3>Research Interests</h3>
                <textarea class="form-control" id="researchInterests" rows="3" oninput="updatePreview()"></textarea>
            </div>
        </aside>

        <main class="preview-area">
            <div class="resume-paper" id="resumePreview">
                <div class="cv-header" style="text-align: center;">
                    <h1 id="prevName">Dr. Jane Smith</h1>
                    <p id="prevTitle">Senior Researcher</p>
                </div>
                <div class="cv-section">
                    <h3>Research Interests</h3>
                    <p id="prevResearchText"></p>
                </div>
                <div class="cv-section">
                    <h3>Publications</h3>
                    <div id="prevPubList"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pdf-export.js"></script>
</body>
</html>
