<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BioCraft Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">BioCraft Pro</a>
                <div class="nav-links">
                    <a href="templates.html">Templates</a>
                    <a href="pricing.html">Pricing</a>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <a href="resume-builder.html" class="btn btn-primary">Start Building</a>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding-top: 150px; padding-bottom: 100px;">
        <div class="container" style="max-width: 600px;">
            <h1 style="text-align: center; margin-bottom: 1rem;">Get in Touch</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem;">Have questions? We're here to help.</p>

            <form class="feature-card" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
