<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Builder | BioCraft Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">BioCraft Pro</a>
                <div class="nav-links">
                    <button class="btn btn-primary" onclick="exportPDF()">Download Biodata</button>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </nav>
        </div>
    </header>

    <div class="builder-container">
        <aside class="editor-sidebar">
            <div class="editor-section">
                <h3>Personal Details</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="fullName" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Father's Name</label>
                    <input type="text" class="form-control" id="fatherName" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" class="form-control" id="dob" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select class="form-control" id="gender" onchange="updatePreview()">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="editor-section">
                <h3>Contact Information</h3>
                <div class="form-group">
                    <label>Address</label>
                    <textarea class="form-control" id="address" oninput="updatePreview()"></textarea>
                </div>
            </div>
        </aside>

        <main class="preview-area">
            <div class="resume-paper" id="resumePreview">
                <h2 style="text-align: center; text-decoration: underline;">BIODATA</h2>
                <table style="width: 100%; margin-top: 2rem; border-collapse: collapse;">
                    <tr>
                        <td style="padding: 10px; font-weight: bold; width: 30%;">Full Name:</td>
                        <td style="padding: 10px;" id="prevName"></td>
                    </tr>
                    <tr>
                        <td style="padding: 10px; font-weight: bold;">Father's Name:</td>
                        <td style="padding: 10px;" id="prevFather"></td>
                    </tr>
                    <tr>
                        <td style="padding: 10px; font-weight: bold;">Date of Birth:</td>
                        <td style="padding: 10px;" id="prevDob"></td>
                    </tr>
                    <tr>
                        <td style="padding: 10px; font-weight: bold;">Gender:</td>
                        <td style="padding: 10px;" id="prevGender"></td>
                    </tr>
                    <tr>
                        <td style="padding: 10px; font-weight: bold;">Address:</td>
                        <td style="padding: 10px;" id="prevAddress"></td>
                    </tr>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pdf-export.js"></script>
</body>
</html>
